id: http://example.org/minimal
name: minimal
prefixes:
  ex: http://example.org/
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: ex


classes:
  Person:
    description: "A minimal person class"
    slots:
      - id
      - name

slots:
  id:
    identifier: true
    range: xsd:string
  name:
    range: xsd:string
