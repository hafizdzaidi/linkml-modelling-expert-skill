id: http://example.org/minimal
name: minimal
prefixes:
  ex: http://example.org/
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: ex

types:
  string:
    uri: xsd:string
    description: "Primitive string (xsd:string)"



classes:
  Person:
    description: "A minimal person class"
    slots:
      - id
      - name

slots:
  id:
    identifier: true
    range: string
  name:
    range: string
