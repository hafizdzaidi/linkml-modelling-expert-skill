id: http://example.org/prefix-example
name: prefix-example
prefixes:
  ex: http://example.org/
  xsd: http://www.w3.org/2001/XMLSchema#
  linkml: https://w3id.org/linkml/
default_prefix: ex

imports:
  - linkml:types

classes:
  Thing:
    slots:
      - id
      - label

slots:
  id:
    identifier: true
    range: xsd:string
  label:
    range: xsd:string
