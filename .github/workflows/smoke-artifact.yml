name: Smoke Suite and Artifact Upload

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  smoke:
    name: Run smoke suite and upload logs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "export PATH=\"$HOME/.local/bin:$PATH\"" >> $GITHUB_ENV
          poetry --version

      - name: Install dependencies
        run: |
          if [ -f pyproject.toml ]; then
            poetry install --no-interaction --no-root
          elif [ -f .skills/linkml-modelling-expert/pyproject.toml ]; then
            cd .skills/linkml-modelling-expert && poetry install --no-interaction --no-root
          else
            echo "No pyproject.toml found; skipping dependency install"
          fi

      - name: Run smoke suite
        run: |
          set -eo pipefail
          if [ -f pyproject.toml ]; then
            wd='.'
          elif [ -d .skills/linkml-modelling-expert ]; then
            wd='.skills/linkml-modelling-expert'
          else
            wd='.'
          fi
          cd "$wd"
          if [ -x scripts/check.sh ]; then
            ./scripts/check.sh > smoke.log 2>&1 || true
          elif [ -f scripts/check.py ]; then
            poetry run python scripts/check.py > smoke.log 2>&1 || true
          else
            echo "No smoke script found" > smoke.log
          fi
          echo "Smoke log created at $wd/smoke.log"

      - name: Upload smoke log artifact
        uses: actions/upload-artifact@v4
        with:
          name: smoke-log
          path: '**/smoke.log'
          retention-days: 90
