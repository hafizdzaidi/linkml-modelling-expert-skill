id: http://example.org/inheritance
name: inheritance-slot-usage
prefixes:
  ex: http://example.org/
  xsd: http://www.w3.org/2001/XMLSchema#
  linkml: https://w3id.org/linkml/

default_prefix: ex

imports:
  - linkml:types

classes:
  BaseEntity:
    description: "Base entity with creation timestamp"
    slots:
      - created_on
  Person:
    description: "A person entity"
    is_a: BaseEntity
    slot_usage:
      created_on:
        range: date
        description: "Date when person was created (no time)"
  Event:
    description: "An event entity"
    is_a: BaseEntity
    slot_usage:
      created_on:
        range: datetime
        description: "Timestamp when event was created (with time)"

slots:
  created_on:
    description: "Creation timestamp"
    range: datetime
