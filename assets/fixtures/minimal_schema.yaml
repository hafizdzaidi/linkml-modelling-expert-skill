id: http://example.org/minimal
name: minimal
prefixes:
  ex: http://example.org/
  xsd: http://www.w3.org/2001/XMLSchema#
  linkml: https://w3id.org/linkml/

default_prefix: ex

imports:
  - linkml:types



classes:
  Person:
    description: "A minimal person class"
    slots:
      - id
      - name

slots:
  id:
    description: "Unique identifier"
    identifier: true
    range: string
  name:
    description: "Person's full name"
    range: string
