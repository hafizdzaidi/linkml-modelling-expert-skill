id: http://example.org/minimal
name: minimal
prefixes:
  ex: http://example.org/
default_prefix: ex

classes:
  Person:
    description: "A minimal person class"
    slots:
      - id
      - name

slots:
  id:
    identifier: true
    description: "Identifier"
    range: string
  name:
    description: "Full name"
    range: string
